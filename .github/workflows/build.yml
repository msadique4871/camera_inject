name: Build cam_inject.ko for GKI kernels

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build-gki:
    strategy:
      matrix:
        gki-branch:
          - android12-5.10
          - android13-5.15
          - android14-6.1
          - android15-6.6
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git curl bc bison flex libssl-dev libelf-dev make python3 dwarves gcc-aarch64-linux-gnu

      - name: Fetch GKI kernel source (${{ matrix.gki-branch }})
        run: |
          git clone --depth=1 \
            https://android.googlesource.com/kernel/common \
            -b ${{ matrix.gki-branch }} \
            /tmp/gki-${{ matrix.gki-branch }}

      - name: Generate defconfig + prepare
        run: |
          cd /tmp/gki-${{ matrix.gki-branch }}
          make ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- \
            gki_defconfig
          make ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- \
            modules_prepare

      - name: Build cam_inject.ko
        run: |
          cd /tmp/gki-${{ matrix.gki-branch }}
          make ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- \
            M=${{ github.workspace }}/kernel \
            modules

      - name: Rename
        run: |
          mv kernel/cam_inject.ko cam_inject-${{ matrix.gki-branch }}.ko

      - uses: actions/upload-artifact@v4
        with:
          name: cam_inject-${{ matrix.gki-branch }}
          path: cam_inject-${{ matrix.gki-branch }}.ko

  build-userspace:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27
          add-to-path: false

      - name: Build injector (ARM64 static)
        run: |
          NDK_BIN=${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin
          cd userspace
          ${NDK_BIN}/aarch64-linux-android21-clang \
            -O2 -static -Wall -o injector injector.c
          file injector

      - uses: actions/upload-artifact@v4
        with:
          name: injector-binary
          path: userspace/injector

  package-magisk:
    needs: [build-gki, build-userspace]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4

      - name: Assemble Magisk zips
        run: |
          for ko in cam_inject-*.ko; do
            base=${ko%.ko}
            mkdir -p /tmp/magisk/$base
            cp magisk_module/* /tmp/magisk/$base/
            sed -i "s/version=.*/version=${base#cam_inject-}/" \
              /tmp/magisk/$base/module.prop
            cp "$ko" /tmp/magisk/$base/cam_inject.ko
            cp injector-binary/injector /tmp/magisk/$base/injector
            cd /tmp/magisk/$base
            zip -r ${{ github.workspace }}/$base-magisk.zip .
          done

      - uses: actions/upload-artifact@v4
        with:
          name: magisk-modules
          path: "cam_inject-*-magisk.zip"
